<!doctype html>
<html lang="{{ ui_lang }}" data-ui-lang="{{ ui_lang }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LensText — Multilingual OCR</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <path d="M3 9h18M9 3v18"/>
      </svg>
    </div>
    <div class="brand-text">
      <strong>LensText</strong>
      <span data-i18n="tagline">Image to Text · Multilingual OCR</span>
    </div>
  </div>

  <div class="topbar-right">
    <select id="uiLangSelect" class="select" aria-label="UI language">
      <option value="en">English</option>
      <option value="fa">فارسی</option>
      <option value="ru">Русский</option>
      <option value="zh">中文</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="tr">Türkçe</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="ar">العربية</option>
    </select>
    <button id="themeToggle" class="icon-btn" aria-label="Theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</header>

<main class="container">

  <section class="hero">
    <h1 data-i18n="hero_title">Extract text from any image in any language</h1>
    <p data-i18n="hero_sub">Upload an image and get the text instantly.</p>
  </section>

  <section class="card">

    <div class="tabs">
      <button class="tab active" data-tab="upload" data-i18n="tab_upload">Upload</button>
      <button class="tab" data-tab="url" data-i18n="tab_url">From URL</button>
      <button class="tab" data-tab="paste" data-i18n="tab_paste">Paste / Drop</button>
    </div>

    <div class="tab-panel active" data-panel="upload">
      <label class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept="image/*" hidden>
        <div class="dz-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <div class="dz-text">
          <strong data-i18n="dz_title">Click to upload or drag &amp; drop</strong>
          <span data-i18n="dz_sub">PNG · JPG · WEBP · BMP · up to 16 MB</span>
        </div>
      </label>
    </div>

    <div class="tab-panel" data-panel="url">
      <div class="url-row">
        <input type="url" id="urlInput" class="text-input" placeholder="https://example.com/image.png">
        <button id="urlGoBtn" class="btn primary" data-i18n="extract">Extract</button>
      </div>
    </div>

    <div class="tab-panel" data-panel="paste">
      <div class="paste-area" id="pasteArea" tabindex="0">
        <div class="paste-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <p data-i18n="paste_hint">Press <kbd>Ctrl/Cmd + V</kbd> here to paste an image, or drop one.</p>
      </div>
    </div>

    <div class="preview-wrap" id="previewWrap" hidden>
      <img id="preview" alt="">
      <button class="btn ghost small" id="clearBtn" data-i18n="clear">Clear</button>
    </div>

  </section>

  <section class="card results" id="results" hidden>

    <div class="result-head">
      <div class="meta">
        <span class="meta-item"><span data-i18n="m_detected">Detected</span>: <b id="detectedLang">—</b></span>
        <span class="meta-item"><span data-i18n="m_chars">Chars</span>: <b id="charCount">0</b></span>
        <span class="meta-item"><span data-i18n="m_words">Words</span>: <b id="wordCount">0</b></span>
      </div>

      <div class="translate-row">
        <label data-i18n="translate_to">Translate to</label>
        <select id="targetLangSelect" class="select">
          <option value="en">English</option>
          <option value="fa">Persian</option>
          <option value="ru">Russian</option>
          <option value="ar">Arabic</option>
          <option value="zh-CN">Chinese</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="es">Spanish</option>
          <option value="tr">Turkish</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="hi">Hindi</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
        </select>
        <button id="translateBtn" class="btn primary" data-i18n="translate">Translate</button>
      </div>
    </div>

    <div class="result-grid">
      <div class="result-col">
        <div class="col-head">
          <h3 data-i18n="extracted">Extracted text</h3>
          <div class="col-actions">
            <button class="icon-btn" data-copy="extractedText" title="Copy">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
            <button class="icon-btn" data-download="extractedText" title="Download .txt">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
          </div>
        </div>
        <textarea id="extractedText" class="result-area" spellcheck="false"></textarea>
      </div>

      <div class="result-col">
        <div class="col-head">
          <h3 data-i18n="translation">Translation</h3>
          <div class="col-actions">
            <button class="icon-btn" data-copy="translatedText" title="Copy">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
            <button class="icon-btn" data-download="translatedText" title="Download .txt">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
          </div>
        </div>
        <textarea id="translatedText" class="result-area" spellcheck="false" placeholder=""></textarea>
      </div>
    </div>
  </section>


</main>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay" hidden>
  <div class="spinner"></div>
  <div class="overlay-text" data-i18n="processing">Processing…</div>
</div>

<footer class="footer">
  <span>© LensText</span>
  <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
</footer>

<script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
